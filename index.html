<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Blog preview card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="card-container">
    <div class="card-img">
      <img src="assets/images/illustration-article.svg" alt="Illustration-article">
    </div>
    <div class="card-tag">
      <button>Learning</button>
    </div>
    <div class="card-publish-date">
      <h5>Published 21 Dec 2023</h5>
    </div>
    <div class="card-title">
      <h2>HTML & CSS foundations</h2>
    </div>
    <div class="card-description">
      <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <div class="blogger">
      <img src="assets/images/image-avatar.webp" alt="Image avatar">
      <h4>Greg Hooper</h4>
    </div>
  </div>
</body>
</html>
